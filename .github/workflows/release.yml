name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ---------------------------------------------------------------
      # Build MCP Server (TypeScript)
      # ---------------------------------------------------------------
      - name: Build MCP Server
        working-directory: server
        run: |
          npm ci
          npm run build

      # ---------------------------------------------------------------
      # Build Plugin + CommandSet (Revit 2026 only, .NET 8)
      # ---------------------------------------------------------------
      - name: Build Revit 2026 (.NET 8)
        run: dotnet build mcp-servers-for-revit.sln -c "Release R26"

      # ---------------------------------------------------------------
      # Create Release Assets
      # ---------------------------------------------------------------
      - name: Create release assets
        run: |
          $version = "${{ github.ref_name }}"
          $outputDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $outputDir

          $addinDir = "plugin/bin/AddIn 2026 Release R26"
          if (Test-Path $addinDir) {
            $zipName = "$outputDir/mcp-servers-for-revit-$version-Revit2026.zip"
            Compress-Archive -Path "$addinDir/*" -DestinationPath $zipName
            Write-Host "Created $zipName"
          } else {
            Write-Host "Warning: AddIn output not found: $addinDir"
          }
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install and build
        working-directory: server
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        working-directory: server
        run: npm publish --access public
